name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit + Felix integration tests
        run: uv run pytest tests/test_simple.py tests/test_felix_integration.py -q --tb=short

      - name: Import smoke check
        run: |
          uv run python -c "
          import streamlit as st
          import requests
          import urllib3
          print(f'streamlit={st.__version__}')
          print(f'requests={requests.__version__}')
          print(f'urllib3={urllib3.__version__}')
          "

      # Temporary: force CI fail on Felix upgrade PRs so we can test auto-remediation.
      - name: Felix remediate test gate
        if: startsWith(github.head_ref, 'felix/upgrade/')
        run: |
          echo "Intentional failure for Felix remediate testing"
          exit 1
